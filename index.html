<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lift Log">
<title>Lift Log — 3-Day Dumbbell</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏋️</text></svg>">
<style>
:root {
  color-scheme: dark;
  --bg: #0a0e1a;
  --bg-raised: #121828;
  --card: #161c2c;
  --card-2: #1d243a;
  --border: #283147;
  --border-strong: #3a4664;
  --text: #e7ebf3;
  --text-dim: #8a94a9;
  --text-faint: #5a6478;
  --accent: #5a9bff;
  --accent-dim: #2d5aa8;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --pr: #c084fc;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 6px 20px rgba(0,0,0,.35);
  --tap: 44px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}
body {
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
  padding-top: env(safe-area-inset-top);
}
#app {
  max-width: 640px;
  margin: 0 auto;
  padding: 16px 14px 140px;
}
button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  -webkit-appearance: none;
}
input, select, textarea {
  font: inherit;
  color: inherit;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  outline: none;
}
input:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 64px; width: 100%; }

/* ========== Top bar ========== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 4px 14px;
  gap: 8px;
}
.topbar h1 {
  font-size: 20px;
  margin: 0;
  letter-spacing: 0.2px;
}
.topbar .sub { color: var(--text-dim); font-size: 13px; }
.topbar .icon-btn {
  min-width: var(--tap); min-height: var(--tap);
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 10px; color: var(--text-dim);
}
.topbar .icon-btn:hover { color: var(--text); background: var(--card); }

/* ========== Buttons ========== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  min-height: var(--tap);
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  font-weight: 500;
  transition: transform .05s, background .15s;
  text-decoration: none;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #4d8bef; }
.btn-ghost { background: transparent; border: 1px solid var(--border); }
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
.btn-block { width: 100%; }
.btn-lg { padding: 14px 22px; font-size: 16px; min-height: 56px; }
.btn-sm { padding: 6px 12px; font-size: 13px; min-height: 32px; }

/* ========== Home ========== */
.day-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  color: var(--text);
  text-align: left;
  width: 100%;
  box-shadow: var(--shadow);
}
.day-card:hover { border-color: var(--border-strong); }
.day-card .meta { display: flex; flex-direction: column; gap: 4px; }
.day-card .title { font-size: 18px; font-weight: 600; }
.day-card .detail { color: var(--text-dim); font-size: 13px; }
.day-card .chev { color: var(--text-faint); font-size: 22px; }
.day-card .badge {
  display: inline-block;
  padding: 2px 8px;
  background: var(--accent-dim);
  color: #cfe0ff;
  border-radius: 999px;
  font-size: 11px;
  margin-top: 4px;
  letter-spacing: .3px;
}
.secondary-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}
.sync-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  margin-bottom: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-dim);
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-faint);
  flex-shrink: 0;
}
.sync-dot.ok { background: var(--success); }
.sync-dot.pending { background: var(--warning); animation: pulse 1.4s ease-in-out infinite; }
.sync-dot.err { background: var(--danger); }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }

/* ========== Session view ========== */
.session-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.session-header h2 { margin: 0; font-size: 22px; }
.order-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 12.5px;
  color: var(--text-dim);
}
.order-toggle:hover { color: var(--text); }

.weight-group-label {
  margin: 20px 0 8px;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding-left: 6px;
}

.exercise-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  transition: border-color .15s, box-shadow .3s;
}
/* FLIP reshuffle: brief glow on the card that was just bumped to a new group */
.exercise-card.just-moved {
  animation: justMoved 900ms ease-out;
}
@keyframes justMoved {
  0%   { box-shadow: 0 0 0 0 rgba(90,155,255,.0),    0 0 0 0 rgba(90,155,255,.0); border-color: var(--accent); }
  30%  { box-shadow: 0 0 0 3px rgba(90,155,255,.28), 0 6px 22px rgba(90,155,255,.35); border-color: var(--accent); }
  100% { box-shadow: 0 0 0 0 rgba(90,155,255,.0),    0 0 0 0 rgba(90,155,255,.0); border-color: var(--border); }
}
@media (prefers-reduced-motion: reduce) {
  .exercise-card.just-moved { animation: none; }
}
.exercise-card.done {
  border-color: rgba(74,222,128,.35);
  background: linear-gradient(180deg, var(--card), rgba(74,222,128,.04));
}
.exercise-card.collapsed { padding: 12px 14px; }
.exercise-card.collapsed .collapsed-body { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.exercise-card.collapsed .collapsed-summary {
  color: var(--text-dim); font-size: 12.5px;
  display: flex; align-items: center; gap: 8px;
}
.collapsed-expand {
  font-size: 12px; color: var(--accent);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
}

.ex-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.ex-name-btn {
  text-align: left;
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 16px; font-weight: 600;
  color: var(--text);
  padding: 4px 6px 4px 0;
  margin: -4px 0 -4px -6px;
  border-radius: 6px;
}
.ex-name-btn:hover { color: var(--accent); }
.ex-name-btn .info-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border: 1px solid var(--text-faint);
  border-radius: 50%;
  font-size: 11px;
  color: var(--text-faint);
}
.ex-target { color: var(--text-dim); font-size: 13px; margin-top: 2px; }
.ex-check {
  font-size: 18px;
  color: var(--success);
}
.weight-control {
  display: flex; align-items: center; gap: 10px;
  margin: 14px 0 12px;
  padding: 10px 12px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.weight-control .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.weight-control .value {
  font-size: 20px; font-weight: 600;
  flex: 1; text-align: center;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
.weight-control .value .unit { font-size: 13px; color: var(--text-dim); font-weight: 400; margin-left: 2px; }
.wbtn {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: var(--card-2);
  border: 1px solid var(--border);
  font-size: 20px;
  color: var(--text);
  display: inline-flex; align-items: center; justify-content: center;
}
.wbtn:hover { border-color: var(--accent); color: var(--accent); }
.wbtn:disabled { opacity: .35; color: var(--text-faint); }

.set-row {
  display: grid;
  grid-template-columns: 56px 1fr 1fr;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-top: 1px solid var(--border);
}
.set-row:first-child { border-top: none; padding-top: 4px; }
.set-label {
  font-size: 13px; color: var(--text-dim);
  font-weight: 500;
  display: flex; flex-direction: column; gap: 2px;
}
.set-label .copy-btn {
  font-size: 10.5px;
  color: var(--accent);
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-raised);
  margin-top: 2px;
  align-self: flex-start;
}
.set-label .copy-btn:hover { border-color: var(--accent); }
.pill-group {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.pill {
  padding: 6px 10px;
  border-radius: 7px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  color: var(--text-dim);
  min-width: 34px;
  text-align: center;
}
.pill:hover { border-color: var(--text-faint); color: var(--text); }
.pill.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.pill.on.easy { background: var(--success); border-color: var(--success); color: #0a2617; }
.pill.on.mod { background: var(--warning); border-color: var(--warning); color: #3a2700; }
.pill.on.hard { background: var(--danger); border-color: var(--danger); color: #350b0b; }
.set-col-label {
  font-size: 10.5px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.set-col-label-row {
  display: grid;
  grid-template-columns: 56px 1fr 1fr;
  gap: 8px;
  padding-bottom: 4px;
}

/* Exercise card extras */
.note-bar {
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
.note-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim);
  font-size: 12.5px;
  padding: 4px 0;
}
.note-toggle:hover { color: var(--text); }
.note-prev {
  color: var(--text-faint);
  font-size: 12px;
  font-style: italic;
  margin-top: 6px;
  padding: 6px 10px;
  background: var(--bg-raised);
  border-radius: 8px;
  border: 1px dashed var(--border);
}
.warmup-banner {
  margin: 10px 0 12px;
  padding: 10px 12px;
  background: rgba(251, 191, 36, .08);
  border: 1px solid rgba(251, 191, 36, .3);
  border-radius: 10px;
  font-size: 12.5px;
  color: #fde8a7;
  display: flex; align-items: center; gap: 10px;
  line-height: 1.4;
}
.warmup-banner .dismiss {
  color: var(--warning);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-left: auto;
}

/* ========== Rest timer bar ========== */
.rest-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(26, 32, 56, .97), rgba(22, 28, 44, .97));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-strong);
  padding: 12px 14px calc(12px + env(safe-area-inset-top));
  padding-top: calc(12px + env(safe-area-inset-top));
  z-index: 60;
  display: none;
}
.rest-bar.show { display: block; animation: slidedown .2s ease-out; }
@keyframes slidedown { from { transform: translateY(-100%) } to { transform: translateY(0) } }
.rest-bar.flash { animation: restdone .4s ease-out 3; }
@keyframes restdone {
  0%, 100% { background: linear-gradient(180deg, rgba(26, 32, 56, .97), rgba(22, 28, 44, .97)); }
  50% { background: linear-gradient(180deg, rgba(74, 222, 128, .5), rgba(74, 222, 128, .3)); }
}
.rest-inner {
  max-width: 640px;
  margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
}
.rest-time {
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  min-width: 76px;
}
.rest-label {
  flex: 1;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.rest-btns { display: flex; gap: 6px; }
.rest-btn {
  padding: 6px 10px;
  background: var(--card-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
}
.rest-btn:hover { border-color: var(--accent); }
.rest-bar.done .rest-time { color: var(--success); }
.rest-bar.done .rest-label { color: var(--success); }
body.rest-active #app {
  padding-top: 90px;
  transition: padding-top .2s;
}

/* ========== Sticky action bar ========== */
.action-bar {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, rgba(10,14,26,0), rgba(10,14,26,.95) 30%);
  pointer-events: none;
  display: flex; justify-content: center;
  z-index: 40;
}
.action-bar .inner {
  max-width: 640px; width: 100%;
  pointer-events: auto;
}

/* ========== Modal ========== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  display: none;
  align-items: flex-end; justify-content: center;
  z-index: 100;
  animation: fadein .15s ease-out;
}
.modal-backdrop.show { display: flex; }
@keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
.modal {
  background: var(--card);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  width: 100%;
  max-width: 640px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px 18px calc(28px + env(safe-area-inset-bottom));
  border: 1px solid var(--border);
  border-bottom: none;
  animation: slideup .2s ease-out;
  position: relative;
}
@keyframes slideup { from { transform: translateY(100%) } to { transform: translateY(0) } }
.modal h3 { margin: 0 0 10px; font-size: 18px; }
.modal .form-cue {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  margin: 10px 0 16px;
}
.modal-close {
  position: absolute; top: 14px; right: 14px;
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  border-radius: 8px;
}
.modal-close:hover { color: var(--text); background: var(--bg-raised); }
.modal-grip {
  width: 40px; height: 4px;
  background: var(--border-strong);
  border-radius: 2px;
  margin: -8px auto 14px;
}

/* Sparkline */
.spark-wrap {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  margin: 10px 0 14px;
}
.spark-wrap .spark-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--text-dim);
}
.spark-wrap .spark-head strong { color: var(--text); font-size: 13px; font-weight: 600; }
.spark-wrap svg { display: block; width: 100%; height: auto; }
.spark-empty { color: var(--text-faint); font-size: 13px; text-align: center; padding: 12px; }

/* ========== Completion preview ========== */
.preview-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
}
.preview-card.pr { border-color: rgba(192, 132, 252, .5); background: linear-gradient(180deg, var(--card), rgba(192, 132, 252, .06)); }
.preview-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.pr-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--pr);
  background: rgba(192, 132, 252, .1);
  border: 1px solid rgba(192, 132, 252, .4);
  padding: 2px 8px; border-radius: 999px;
  font-weight: 500;
  letter-spacing: .4px;
}
.preview-change {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
.arrow { color: var(--text-faint); }
.change-up { color: var(--success); }
.change-same { color: var(--text-dim); }
.change-down { color: var(--danger); }
.preview-reason { color: var(--text-dim); font-size: 12.5px; margin-top: 6px; }
.preview-note { color: var(--text-faint); font-size: 12px; font-style: italic; margin-top: 4px; }

/* ========== History ========== */
.hist-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  text-align: left;
  width: 100%;
  display: block;
  color: var(--text);
}
.hist-item:hover { border-color: var(--border-strong); }
.hist-head { display: flex; justify-content: space-between; font-size: 15px; }
.hist-date { color: var(--text-dim); font-size: 13px; }
.hist-ex { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
.hist-ex strong { color: var(--text); font-weight: 500; }
.hist-meta { color: var(--text-faint); font-size: 12px; margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
.hist-meta span::before { content: "·"; margin-right: 10px; color: var(--text-faint); }
.hist-meta span:first-child::before { display: none; margin: 0; }

.hist-note {
  color: var(--text-faint);
  font-size: 12px;
  font-style: italic;
  margin-top: 4px;
  padding-left: 8px;
  border-left: 2px solid var(--border);
}

/* ========== Settings ========== */
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.setting-row:last-child { border-bottom: none; }
.setting-row .label { font-size: 15px; }
.setting-row .desc { color: var(--text-dim); font-size: 12.5px; margin-top: 3px; }

.switch {
  position: relative;
  width: 44px; height: 26px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 14px;
  transition: background .15s, border-color .15s;
  flex-shrink: 0;
}
.switch::before {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  background: var(--text-dim);
  border-radius: 50%;
  transition: left .15s, background .15s;
}
.switch.on { background: var(--accent); border-color: var(--accent); }
.switch.on::before { left: 20px; background: #fff; }

/* ========== Toast ========== */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(100px + env(safe-area-inset-bottom));
  transform: translateX(-50%);
  background: var(--card-2);
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 14px;
  z-index: 200;
  animation: toastin .2s ease-out;
  box-shadow: var(--shadow);
  max-width: 92%;
  display: flex; align-items: center; gap: 12px;
}
@keyframes toastin { from { opacity: 0; transform: translate(-50%, 10px) } to { opacity: 1; transform: translate(-50%, 0) } }
.toast .undo-btn {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
}
.toast .undo-btn:hover { background: rgba(90, 155, 255, .1); }

.hint {
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.5;
  margin: 8px 0 16px;
}
a { color: var(--accent); }

<body>

<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
//============================================================
// LIFT LOG — 3-Day Full-Body Dumbbell Tracker
// v2: rest timer, wake lock, haptics, charts, collapse, PR,
//     undo, notes, duration, warmup reminders
//============================================================

const DUMBBELLS = [10, 15, 20, 25, 30, 35, 40, 45, 50];

const EXERCISES = {
  "db-squat": { name: "Dumbbell Squat", slug: "dumbbell-squat", start: 15,
    cue: "DBs at sides or goblet-style. Sit back, knees track over toes, aim for parallel or just below. Chest up, core braced." },
  "db-sldl": { name: "Dumbbell Stiff Legged Deadlift", slug: "dumbbell-stiff-legged-deadlift", start: 20,

  "db-row": { name: "Bent Over Dumbbell Row", slug: "bent-over-dumbbell-row", start: 15,

  "db-bench": { name: "Dumbbell Bench Press", slug: "dumbbell-bench-press", start: 15,

  "lat-raise": { name: "Lateral Raises", slug: "lateral-raises", start: 10,

  "db-curl": { name: "Standing Dumbbell Curl", slug: "standing-dumbbell-curl", start: 10,

  "lying-ext": { name: "Lying Dumbbell Extension", slug: "lying-dumbbell-extension", start: 10,
    cue: "Lie on bench, DBs above chest with elbows pointed up. Bend at the elbows only to lower toward forehead. Keep upper arms still." },
  "db-lunge": { name: "Dumbbell Lunge", slug: "dumbbell-lunge", start: 15,
    cue: "Step forward far enough that front shin is vertical at the bottom. Back knee drops toward floor. Drive through the front heel." },
  "db-ham-curl": { name: "Dumbbell Hamstring Curl", slug: "dumbbell-hamstring-curl", start: 10,
    cue: "Lie face down on bench. Place a DB vertically between your feet (get help setting up). Curl heels toward glutes, slow on the way down." },
  "db-deadlift": { name: "Dumbbell Deadlift", slug: "dumbbell-deadlift", start: 20,
    cue: "DBs just outside feet. Hinge and slight squat to grab. Drive through the floor, stand tall, lock out hips at the top." },
  "db-military": { name: "Dumbbell Military Press", slug: "dumbbell-military-press", start: 10,
    cue: "Standing, DBs at shoulder height, palms forward. Press straight overhead, brace core so you don't lean back. Don't lock out aggressively." },
  "db-flys": { name: "Dumbbell Flys", slug: "dumbbell-flys", start: 10,
    cue: "Lie on bench, DBs above chest with a slight elbow bend (lock it in). Open the arms in a wide arc, stretch the chest, then arc back up." },
  "hammer-curl": { name: "Hammer Curl", slug: "hammer-curls", start: 10,
    cue: "Neutral grip (palms facing each other the whole time). Elbows pinned. Hits biceps, brachialis, and forearm." },
  "seated-ext": { name: "Seated Dumbbell Extension", slug: "seated-dumbbell-extension", start: 10,
    cue: "Seated, hold one DB overhead with both hands. Lower behind the head by bending the elbows. Keep elbows close, upper arms vertical." },
  "db-stepup": { name: "Dumbbell Step Up", slug: "dumbbell-step-up", start: 15,
    cue: "One foot on a sturdy bench or box. Drive through the heel to stand tall on top. Control on the way down — don't just drop." },
  "one-arm-press": { name: "One Arm Dumbbell Press", slug: "one-arm-dumbbell-shoulder-press", start: 10,
    cue: "Standing or seated, one DB at shoulder. Press straight up. Brace the core hard to stop yourself from leaning sideways." },
  "rev-grip-press": { name: "Reverse Grip Dumbbell Press", slug: "reverse-grip-dumbbell-bench-press", start: 10,
    cue: "Bench press with palms facing you (supinated). Emphasizes upper chest. Go noticeably lighter than a standard bench press." },
  "rear-delt-fly": { name: "Dumbbell Rear Delt Fly", slug: "bent-over-dumbbell-rear-delt-raise-with-head-on-bench", start: 10,
    cue: "Hinge forward or lie chest-down on an incline. Let DBs hang, soft elbow bend, open arms wide. Pull shoulder blades together — not the arms." },
  "zottman-curl": { name: "Zottman Curl", slug: "zottman-curl", start: 10,
    cue: "Curl up with palms facing you (supinated). At the top, rotate to palms down (pronated). Lower with the pronated grip, then flip at bottom." },
  "close-grip-press": { name: "Close Grip Dumbbell Press", slug: "close-grip-dumbbell-press", start: 10,
    cue: "Lying bench press with DBs touching, palms facing each other (neutral grip). Elbows tucked close. Pure triceps." }
};

const PROGRAM = {
  days: [
    { name: "Day 1", exercises: [
      { id: "db-squat", sets: 3, reps: 10 },
      { id: "db-sldl", sets: 3, reps: 10 },
      { id: "db-row", sets: 3, reps: 10 },
      { id: "db-bench", sets: 3, reps: 10 },
      { id: "lat-raise", sets: 2, reps: 8 },
      { id: "db-curl", sets: 2, reps: 8 },
      { id: "lying-ext", sets: 2, reps: 8 }
    ]},
    { name: "Day 2", exercises: [
      { id: "db-lunge", sets: 3, reps: 10 },
      { id: "db-ham-curl", sets: 3, reps: 10 },
      { id: "db-deadlift", sets: 3, reps: 10 },
      { id: "db-military", sets: 3, reps: 10 },
      { id: "db-flys", sets: 2, reps: 8 },
      { id: "hammer-curl", sets: 2, reps: 8 },
      { id: "seated-ext", sets: 2, reps: 8 }
    ]},
    { name: "Day 3", exercises: [
      { id: "db-stepup", sets: 3, reps: 10 },
      { id: "db-sldl", sets: 3, reps: 10 },
      { id: "one-arm-press", sets: 3, reps: 10 },
      { id: "rev-grip-press", sets: 3, reps: 10 },
      { id: "rear-delt-fly", sets: 2, reps: 8 },
      { id: "zottman-curl", sets: 2, reps: 8 },
      { id: "close-grip-press", sets: 2, reps: 8 }
    ]}
  ]
};

// An exercise is "compound" if it's the 3x10 ones
function isCompound(exDef) { return exDef.sets >= 3 && exDef.reps >= 10; }

//============================================================
// State + Storage
//============================================================

const STORAGE_KEY = "liftlog.v1";
const PANTRY_BASKET = "workout-data";
const SCHEMA_VERSION = 2;

function defaultState() {
  const weights = {};
  for (const id in EXERCISES) weights[id] = EXERCISES[id].start;
  return {
    version: SCHEMA_VERSION,
    updatedAt: new Date().toISOString(),
    weights,
    sessions: [],
    draft: null,
    settings: {
      pantryId: "",
      orderMode: "weight",
      restEnabled: true,
      restCompoundSec: 90,
      restIsolationSec: 60,
      hapticsEnabled: true,
      warmupReminders: true,
      autoCollapse: true,
      soundEnabled: true,
    }
  };
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const d = defaultState();
    return { ...d, ...parsed,
      weights: { ...d.weights, ...(parsed.weights || {}) },
      settings: { ...d.settings, ...(parsed.settings || {}) }
    };
  } catch (e) { return defaultState(); }
}

function saveState(skipSync) {
  state.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (!skipSync && state.settings.pantryId) scheduleSync();
}

//============================================================
// Pantry sync
//============================================================

const pantryUrl = (id) => `https://getpantry.cloud/apiv1/pantry/${encodeURIComponent(id)}/basket/${PANTRY_BASKET}`;

let syncStatus = "idle";
let syncMessage = "";
let syncTimer = null;

function setSync(status, message) {
  syncStatus = status;
  syncMessage = message || "";
  const el = document.getElementById("sync-status");
  if (el) renderSyncStatus(el);
}

function scheduleSync() {
  if (!state.settings.pantryId) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToPantry, 800);
}

async function pushToPantry() {
  const id = state.settings.pantryId;
  if (!id) return;
  setSync("syncing", "Saving to cloud…");
  try {
    const resp = await fetch(pantryUrl(id), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state)
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    setSync("ok", "Synced");
  } catch (e) {
    setSync("error", "Offline — saved locally");
  }
}

async function pullFromPantry(opts = {}) {
  const id = state.settings.pantryId;
  if (!id) return;
  setSync("syncing", "Checking cloud…");
  try {
    const resp = await fetch(pantryUrl(id));
    if (resp.status === 400 || resp.status === 404) {
      await pushToPantry();
      return;
    }
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const remote = await resp.json();
    if (remote && remote.updatedAt && new Date(remote.updatedAt) > new Date(state.updatedAt || 0)) {
      state = {
        ...defaultState(),
        ...remote,
        settings: { ...state.settings, ...(remote.settings || {}), pantryId: id }
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setSync("ok", "Pulled latest from cloud");
      if (opts.rerender) render();
    } else {
      await pushToPantry();
    }
  } catch (e) {
    setSync("error", "Offline — using local data");
  }
}

//============================================================
// Haptics
//============================================================

function haptic(duration = 10) {
  if (!state.settings.hapticsEnabled) return;
  try {
    if (navigator.vibrate) navigator.vibrate(duration);
  } catch (e) {}
}
function hapticPattern(pattern) {
  if (!state.settings.hapticsEnabled) return;
  try {
    if (navigator.vibrate) navigator.vibrate(pattern);
  } catch (e) {}
}

//============================================================
// Sound — short beep via Web Audio, requires user gesture to init
//============================================================

let audioCtx = null;
function ensureAudio() {
  if (audioCtx) return audioCtx;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx) audioCtx = new Ctx();
  } catch (e) {}
  return audioCtx;
}
function beep(freq = 880, durMs = 160) {
  if (!state.settings.soundEnabled) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durMs/1000);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + durMs/1000 + 0.02);
  } catch (e) {}
}

//============================================================
// Wake lock
//============================================================

let wakeLockSentinel = null;
async function acquireWakeLock() {
  if (!("wakeLock" in navigator)) return;
  try {
    wakeLockSentinel = await navigator.wakeLock.request("screen");
    wakeLockSentinel.addEventListener("release", () => { wakeLockSentinel = null; });
  } catch (e) { /* user dismissed, battery saver, etc. */ }
}
function releaseWakeLock() {
  if (wakeLockSentinel) {
    try { wakeLockSentinel.release(); } catch (e) {}
    wakeLockSentinel = null;
  }
}
// Re-acquire if visibility returns during a session
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && view.name === "session" && !wakeLockSentinel) {
    acquireWakeLock();
  }
});

//============================================================
// Rest timer
//============================================================

let restState = { running: false, endsAt: 0, totalSec: 0, intervalId: null, label: "Rest" };

function startRest(seconds, label = "Rest") {
  if (!state.settings.restEnabled) return;
  ensureAudio(); // warm up audio context on user gesture
  restState.running = true;
  restState.endsAt = Date.now() + seconds * 1000;
  restState.totalSec = seconds;
  restState.label = label;
  clearInterval(restState.intervalId);
  restState.intervalId = setInterval(tickRest, 250);
  renderRestBar();
  document.body.classList.add("rest-active");
}
function tickRest() {
  if (!restState.running) return;
  const remaining = Math.max(0, restState.endsAt - Date.now());
  renderRestBar();
  if (remaining <= 0) {
    clearInterval(restState.intervalId);
    restState.intervalId = null;
    restState.running = false;
    hapticPattern([120, 80, 120, 80, 200]);
    beep(880, 120);
    setTimeout(() => beep(1175, 180), 180);
    const bar = document.getElementById("rest-bar");
    if (bar) {
      bar.classList.add("done", "flash");
      setTimeout(() => { if (bar) { bar.classList.remove("done", "flash"); } dismissRest(); }, 3500);
    }
  }
}
function adjustRest(deltaSec) {
  if (!restState.running) return;
  restState.endsAt += deltaSec * 1000;
  restState.totalSec += deltaSec;
  haptic(8);
  renderRestBar();
}
function dismissRest() {
  restState.running = false;
  clearInterval(restState.intervalId);
  restState.intervalId = null;
  document.body.classList.remove("rest-active");
  const bar = document.getElementById("rest-bar");
  if (bar) bar.classList.remove("show", "done", "flash");
}
function renderRestBar() {
  const bar = document.getElementById("rest-bar");
  if (!bar) return;
  if (!restState.running && !bar.classList.contains("done")) { bar.classList.remove("show"); return; }
  bar.classList.add("show");
  const remaining = Math.max(0, Math.ceil((restState.endsAt - Date.now()) / 1000));
  const mm = Math.floor(remaining / 60);
  const ss = remaining % 60;
  const timeStr = mm > 0 ? `${mm}:${String(ss).padStart(2,"0")}` : `${ss}s`;
  bar.innerHTML = "";
  const inner = document.createElement("div");
  inner.className = "rest-inner";
  const timeEl = document.createElement("div");
  timeEl.className = "rest-time";
  timeEl.textContent = remaining <= 0 ? "Done!" : timeStr;
  const label = document.createElement("div");
  label.className = "rest-label";
  label.textContent = remaining <= 0 ? "Next set" : restState.label;
  const btns = document.createElement("div");
  btns.className = "rest-btns";
  const plus = document.createElement("button");
  plus.className = "rest-btn";
  plus.textContent = "+30s";
  plus.onclick = () => adjustRest(30);
  const skip = document.createElement("button");
  skip.className = "rest-btn";
  skip.textContent = "Skip";
  skip.onclick = () => { haptic(8); dismissRest(); };
  btns.appendChild(plus);
  btns.appendChild(skip);
  inner.appendChild(timeEl);
  inner.appendChild(label);
  inner.appendChild(btns);
  bar.appendChild(inner);
}

//============================================================
// Undo stack
//============================================================

let pendingUndo = null; // { undoFn, description }
let undoToastTimer = null;

function captureUndo(description, undoFn) {
  pendingUndo = { undoFn, description };
  showUndoToast(description);
}
function showUndoToast(msg) {
  const root = document.getElementById("toast-root");
  if (!root) return;
  root.innerHTML = "";
  const t = document.createElement("div");
  t.className = "toast";
  const text = document.createElement("span");
  text.textContent = msg;
  const btn = document.createElement("button");
  btn.className = "undo-btn";
  btn.textContent = "Undo";
  btn.onclick = () => {
    if (pendingUndo) { haptic(12); pendingUndo.undoFn(); pendingUndo = null; }
    root.innerHTML = "";
  };
  t.appendChild(text);
  t.appendChild(btn);
  root.appendChild(t);
  clearTimeout(undoToastTimer);
  undoToastTimer = setTimeout(() => {
    if (root.firstChild === t) root.innerHTML = "";
    pendingUndo = null;
  }, 4000);
}

//============================================================
// PR tracking
//============================================================

function computeMaxWeights() {
  // Max weight ever lifted where at least one set was completed with reps >= 1
  const maxes = {};
  for (const s of state.sessions) {
    for (const exId in s.entries) {
      const e = s.entries[exId];
      if (!e.sets || e.sets.length === 0) continue;
      const anySetComplete = e.sets.some(set => typeof set.reps === "number" && set.reps >= 1);
      if (!anySetComplete) continue;
      if (!maxes[exId] || e.actualWeight > maxes[exId]) maxes[exId] = e.actualWeight;
    }
  }
  return maxes;
}

//============================================================
// Progression logic (unchanged — passed scenario tests)
//============================================================

function suggestNextWeight(exerciseId, entry, targetReps) {
  if (!entry || !entry.sets || entry.sets.length === 0) {
    return { weight: state.weights[exerciseId] || EXERCISES[exerciseId].start, reason: "No data yet — using starting weight." };
  }
  const rpes = entry.sets.map(s => s.rpe).filter(r => typeof r === "number");
  if (rpes.length === 0) return { weight: entry.actualWeight, reason: "No RPE data — holding." };
  const avgRpe = rpes.reduce((a,b)=>a+b,0) / rpes.length;
  const allRepsHit = entry.sets.every(s => typeof s.reps === "number" && s.reps >= targetReps);
  const current = entry.actualWeight;
  const idx = DUMBBELLS.indexOf(current);
  const maxIdx = DUMBBELLS.length - 1;
  if (idx === -1) {
    const nearest = DUMBBELLS.reduce((best,w) => Math.abs(w-current) < Math.abs(best-current) ? w : best, DUMBBELLS[0]);
    return { weight: nearest, reason: `Snapped to nearest available weight (${nearest} lb).` };
  }
  if (allRepsHit && avgRpe <= 7.4) {
    const next = DUMBBELLS[Math.min(idx + 1, maxIdx)];
    if (next === current) return { weight: current, reason: `RPE ${avgRpe.toFixed(1)} — but already at max dumbbell.` };
    return { weight: next, reason: `RPE ${avgRpe.toFixed(1)}, all reps hit — increase ${current}→${next} lb.` };
  }
  if (allRepsHit && avgRpe <= 8.4) return { weight: current, reason: `RPE ${avgRpe.toFixed(1)} — hold weight, try to add a rep next time.` };
  if (avgRpe >= 9.5) {
    const next = DUMBBELLS[Math.max(idx - 1, 0)];
    if (next === current) return { weight: current, reason: `RPE ${avgRpe.toFixed(1)} — already at min weight, focus on form.` };
    return { weight: next, reason: `RPE ${avgRpe.toFixed(1)} — drop ${current}→${next} lb, build the foundation.` };
  }
  if (!allRepsHit) {
    const missedBy = targetReps - Math.min(...entry.sets.map(s=>s.reps));
    return { weight: current, reason: `Missed ${missedBy} rep${missedBy>1?"s":""} — hold weight, nail target reps first.` };
  }
  return { weight: current, reason: `RPE ${avgRpe.toFixed(1)} — hold.` };
}

function applyProgression(session) {
  const dayDef = PROGRAM.days[session.dayIndex];
  const updates = [];
  const prevMaxes = computeMaxWeights();
  for (const ex of dayDef.exercises) {
    const entry = session.entries[ex.id];
    if (!entry) continue;
    const before = state.weights[ex.id];
    const s = suggestNextWeight(ex.id, entry, ex.reps);
    state.weights[ex.id] = s.weight;
    const prevMax = prevMaxes[ex.id] || 0;
    const isPR = s.weight > prevMax && s.weight > before;
    updates.push({ id: ex.id, name: EXERCISES[ex.id].name, before, after: s.weight, reason: s.reason, isPR });
  }
  return updates;
}

//============================================================
// Routing + rendering
//============================================================

let view = { name: "home" };
const app = () => document.getElementById("app");
let lastViewName = null;

// FLIP reshuffle animation for the session view.
// When exercises re-sort (e.g. after adjusting a weight), capture each
// card's position BEFORE the DOM update, then after the update measure
// again, apply an inverse transform, and let CSS transition it back to 0.
function captureFlipRects(root) {
  const rects = new Map();
  const sy = window.scrollY || 0;
  const sx = window.scrollX || 0;
  root.querySelectorAll("[data-ex-id]").forEach(el => {
    const r = el.getBoundingClientRect();
    rects.set(el.dataset.exId, {
      top: r.top + sy,
      left: r.left + sx,
      width: r.width,
    });
  });
  return rects;
}

function runFlip(root, firstRects, bumpedExId) {
  if (!firstRects || firstRects.size === 0) return;
  const reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduced) { if (bumpedExId) highlightCard(root, bumpedExId); return; }
  const sy = window.scrollY || 0;
  const sx = window.scrollX || 0;
  const movers = [];
  root.querySelectorAll("[data-ex-id]").forEach(el => {
    const first = firstRects.get(el.dataset.exId);
    if (!first) return;
    const r = el.getBoundingClientRect();
    const lastTop = r.top + sy;
    const lastLeft = r.left + sx;
    const dx = first.left - lastLeft;
    const dy = first.top - lastTop;
    if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
    el.style.transition = "none";
    el.style.transform = `translate(${dx}px, ${dy}px)`;
    el.style.willChange = "transform";
    movers.push(el);
  });
  if (movers.length === 0) {
    // Still highlight the bumped card even if it didn't physically move
    if (bumpedExId) highlightCard(root, bumpedExId);
    return;
  }
  // Force reflow so the inverse transform commits before we animate it off
  void root.offsetHeight;
  requestAnimationFrame(() => {
    movers.forEach(el => {
      el.style.transition = "transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1)";
      el.style.transform = "";
    });
    setTimeout(() => {
      movers.forEach(el => {
        el.style.transition = "";
        el.style.willChange = "";
      });
    }, 360);
  });
  if (bumpedExId) highlightCard(root, bumpedExId);
}

function highlightCard(root, exId) {
  const card = root.querySelector(`[data-ex-id="${CSS.escape(exId)}"]`);
  if (!card) return;
  card.classList.remove("just-moved");
  // restart animation
  void card.offsetWidth;
  card.classList.add("just-moved");
  setTimeout(() => card.classList.remove("just-moved"), 900);
}

let pendingBumpExId = null;

function render() {
  const root = app();
  const viewChanged = lastViewName !== view.name;
  const flipEnabled = !viewChanged && view.name === "session";
  const firstRects = flipEnabled ? captureFlipRects(root) : null;
  const bumpedExId = pendingBumpExId;
  pendingBumpExId = null;

  root.innerHTML = "";
  switch (view.name) {
    case "home": renderHome(root); break;
    case "session": renderSession(root); break;
    case "preview": renderPreview(root); break;
    case "history": renderHistory(root); break;
    case "historyDetail": renderHistoryDetail(root); break;
    case "settings": renderSettings(root); break;
    case "onboarding": renderOnboarding(root); break;
    default: renderHome(root);
  }
  if (viewChanged) window.scrollTo({ top: 0, behavior: "instant" });
  if (flipEnabled) runFlip(root, firstRects, bumpedExId);

  lastViewName = view.name;
  // Acquire/release wake lock based on view
  if (view.name === "session") acquireWakeLock();
  else releaseWakeLock();
}

function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === "class") e.className = props[k];
    else if (k === "html") e.innerHTML = props[k];
    else if (k.startsWith("on") && typeof props[k] === "function") e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === "style" && typeof props[k] === "object") Object.assign(e.style, props[k]);
    else if (k in e && k !== "type") e[k] = props[k];
    else e.setAttribute(k, props[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
  }
  return e;
}

//============================================================
// Home
//============================================================

function renderHome(root) {
  const topbar = el("div", { class: "topbar" },
    el("div", {},
      el("h1", {}, "Lift Log"),
      el("div", { class: "sub" }, "3-Day Full Body Dumbbell")
    ),
    el("div", {},
      el("button", { class: "icon-btn", onclick: () => { haptic(8); view = { name: "settings" }; render(); }, title: "Settings", "aria-label": "Settings" },
        el("span", { html: settingsIcon() })
      )
    )
  );
  root.appendChild(topbar);

  const syncEl = el("div", { class: "sync-status", id: "sync-status" });
  renderSyncStatus(syncEl);
  root.appendChild(syncEl);

  for (let i = 0; i < PROGRAM.days.length; i++) {
    const day = PROGRAM.days[i];
    const last = lastSessionForDay(i);
    const card = el("button", { class: "day-card", onclick: () => { haptic(10); startSession(i); } },
      el("div", { class: "meta" },
        el("div", { class: "title" }, day.name),
        el("div", { class: "detail" }, `${day.exercises.length} exercises · ${totalSetsForDay(day)} working sets`),
        last
          ? el("span", { class: "badge" }, `Last: ${relTime(last.date)}`)
          : el("span", { class: "badge" }, "First session")
      ),
      el("div", { class: "chev" }, "›")
    );
    root.appendChild(card);
  }

  if (state.draft) {
    const d = state.draft;
    const dayName = PROGRAM.days[d.dayIndex].name;
    root.appendChild(
      el("div", { class: "preview-card", style: { marginTop: "14px", borderColor: "var(--warning)" } },
        el("div", { class: "preview-name" }, `Unfinished ${dayName} session`),
        el("div", { class: "preview-reason" }, `Started ${relTime(d.date)}`),
        el("div", { style: { marginTop: "10px", display: "flex", gap: "8px" } },
          el("button", { class: "btn btn-primary", onclick: () => { haptic(8); view = { name: "session" }; render(); } }, "Resume"),
          el("button", { class: "btn btn-ghost", onclick: () => {
            if (confirm("Discard unfinished session?")) { haptic(12); state.draft = null; saveState(); render(); }
          }}, "Discard")
        )
      )
    );
  }

  const row = el("div", { class: "secondary-row" },
    el("button", { class: "btn", onclick: () => { haptic(8); view = { name: "history" }; render(); } }, "History"),
    el("button", { class: "btn", onclick: () => { haptic(8); view = { name: "settings" }; render(); } }, "Settings")
  );
  root.appendChild(row);

  // Streak/summary
  if (state.sessions.length > 0) {
    const last7 = state.sessions.filter(s => (Date.now() - new Date(s.date).getTime()) < 7*86400000);
    const last30 = state.sessions.filter(s => (Date.now() - new Date(s.date).getTime()) < 30*86400000);
    root.appendChild(el("div", { class: "hint", style: { marginTop: "20px", textAlign: "center" } },
      `${state.sessions.length} sessions total · ${last7.length} this week · ${last30.length} in the last 30 days`
    ));
  }

  root.appendChild(el("div", { class: "hint", style: { textAlign: "center" } },
    "Tap any exercise name during a workout for the form cue and a video demo."
  ));
}

function totalSetsForDay(day) { return day.exercises.reduce((a, ex) => a + ex.sets, 0); }

function lastSessionForDay(dayIndex) {
  for (let i = state.sessions.length - 1; i >= 0; i--) {
    if (state.sessions[i].dayIndex === dayIndex) return state.sessions[i];
  }
  return null;
}
function lastSessionEntryForExercise(exId, beforeDate) {
  // Finds most recent session (optionally strictly before a given date) with this exercise
  for (let i = state.sessions.length - 1; i >= 0; i--) {
    const s = state.sessions[i];
    if (beforeDate && new Date(s.date) >= new Date(beforeDate)) continue;
    if (s.entries[exId]) return { session: s, entry: s.entries[exId] };
  }
  return null;
}
function relTime(iso) {
  const then = new Date(iso).getTime();
  const diff = Date.now() - then;
  const d = Math.floor(diff / 86400000);
  if (d === 0) return "today";
  if (d === 1) return "yesterday";
  if (d < 7) return `${d}d ago`;
  if (d < 30) return `${Math.floor(d/7)}w ago`;
  return new Date(iso).toLocaleDateString();
}

function renderSyncStatus(container) {
  container.innerHTML = "";
  let dotClass = "sync-dot";
  let text = "";
  if (!state.settings.pantryId) {
    text = "Local only — connect Pantry in Settings for cross-device sync";
  } else if (syncStatus === "syncing") {
    dotClass += " pending";
    text = syncMessage || "Syncing…";
  } else if (syncStatus === "error") {
    dotClass += " err";
    text = syncMessage || "Sync offline";
  } else if (syncStatus === "ok") {
    dotClass += " ok";
    text = syncMessage || "Synced";
  } else {
    dotClass += " ok";
    text = "Connected to cloud";
  }
  container.appendChild(el("span", { class: dotClass }));
  container.appendChild(el("span", {}, text));
}

//============================================================
// Session: start + render
//============================================================

function startSession(dayIndex) {
  ensureAudio(); // warm up audio context
  if (state.draft && state.draft.dayIndex !== dayIndex) {
    if (!confirm(`You have an unfinished ${PROGRAM.days[state.draft.dayIndex].name} session. Starting ${PROGRAM.days[dayIndex].name} will discard it. Continue?`)) return;
  }
  if (state.draft && state.draft.dayIndex === dayIndex) {
    view = { name: "session" };
    render();
    return;
  }
  const day = PROGRAM.days[dayIndex];
  const entries = {};
  for (const ex of day.exercises) {
    entries[ex.id] = {
      suggestedWeight: state.weights[ex.id] ?? EXERCISES[ex.id].start,
      actualWeight: state.weights[ex.id] ?? EXERCISES[ex.id].start,
      sets: [],
      note: "",
      noteOpen: false,
      manuallyExpanded: false,
    };
  }
  state.draft = {
    id: "s" + Date.now(),
    dayIndex,
    date: new Date().toISOString(),
    startedAt: new Date().toISOString(),
    entries,
    warmupDismissed: false,
  };
  saveState();
  view = { name: "session" };
  render();
}

function renderSession(root) {
  const draft = state.draft;
  if (!draft) { view = { name: "home" }; render(); return; }
  const day = PROGRAM.days[draft.dayIndex];

  const topbar = el("div", { class: "topbar" },
    el("button", { class: "icon-btn", onclick: confirmLeaveSession, "aria-label": "Back" },
      el("span", { html: backIcon() })
    ),
    el("div", { style: { textAlign: "center", flex: "1" } },
      el("h1", {}, day.name),
      el("div", { class: "sub" }, elapsedSessionText(draft))
    ),
    el("button", { class: "icon-btn", onclick: toggleOrderMode, title: "Toggle order", "aria-label": "Toggle order" },
      el("span", { html: state.settings.orderMode === "weight" ? groupIcon() : listIcon() })
    )
  );
  root.appendChild(topbar);

  const toggle = el("div", { style: { display: "flex", justifyContent: "center", marginBottom: "12px" } },
    el("div", { class: "segmented" },
      el("button", { class: state.settings.orderMode === "weight" ? "on" : "", onclick: () => { haptic(6); state.settings.orderMode = "weight"; saveState(true); render(); } }, "Grouped by weight"),
      el("button", { class: state.settings.orderMode === "program" ? "on" : "", onclick: () => { haptic(6); state.settings.orderMode = "program"; saveState(true); render(); } }, "Program order")
    )
  );
  root.appendChild(toggle);

  let ordered;
  if (state.settings.orderMode === "weight") {
    const groups = {};
    for (const ex of day.exercises) {
      const w = draft.entries[ex.id].actualWeight;
      (groups[w] = groups[w] || []).push(ex);
    }
    const weights = Object.keys(groups).map(Number).sort((a,b) => a-b);
    ordered = [];
    for (const w of weights) {
      ordered.push({ type: "group", weight: w });
      for (const ex of groups[w]) ordered.push({ type: "ex", ex });
    }
  } else {
    ordered = day.exercises.map(ex => ({ type: "ex", ex }));
  }

  // Find first compound exercise (for warmup banner)
  const firstCompoundId = day.exercises.find(ex => isCompound(ex))?.id;
  let warmupRendered = false;

  for (const item of ordered) {
    if (item.type === "group") {
      root.appendChild(el("div", { class: "weight-group-label" }, `${item.weight} lb group`));
    } else {
      // Warmup banner above the first compound in the session (regardless of ordering)
      if (!warmupRendered && state.settings.warmupReminders && !draft.warmupDismissed && item.ex.id === firstCompoundId && isCompound(item.ex)) {
        root.appendChild(renderWarmupBanner());
        warmupRendered = true;
      }
      root.appendChild(renderExerciseCard(item.ex, draft));
    }
  }

  // Sticky action bar
  const completedCount = day.exercises.filter(ex => isExerciseComplete(ex, draft.entries[ex.id])).length;
  const total = day.exercises.length;
  const bar = el("div", { class: "action-bar" },
    el("div", { class: "inner" },
      el("button", {
        class: "btn btn-lg btn-block " + (completedCount === total ? "btn-primary" : "btn"),
        onclick: finishSession
      },
        completedCount === total ? "Finish & preview next session" : `Finish day (${completedCount}/${total} done)`
      )
    )
  );
  root.appendChild(bar);
}

function elapsedSessionText(draft) {
  const started = new Date(draft.startedAt || draft.date).getTime();
  const mins = Math.floor((Date.now() - started) / 60000);
  const dateStr = new Date(draft.date).toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });
  return `${dateStr} · ${mins}m in`;
}

function renderWarmupBanner() {
  return el("div", { class: "warmup-banner" },
    el("span", {}, "⚡"),
    el("span", {}, "Before your first working set, consider 1–2 light warmup sets (e.g., 5–6 reps at 50–70% of today's weight)."),
    el("button", { class: "dismiss", onclick: () => { haptic(8); state.draft.warmupDismissed = true; saveState(true); render(); }, "aria-label": "Dismiss" }, "✕")
  );
}

function isExerciseComplete(exDef, entry) {
  if (!entry) return false;
  return entry.sets.length >= exDef.sets && entry.sets.slice(0, exDef.sets).every(s => typeof s.reps === "number" && typeof s.rpe === "number");
}

function renderExerciseCard(exDef, draft) {
  const ex = EXERCISES[exDef.id];
  const entry = draft.entries[exDef.id];
  const complete = isExerciseComplete(exDef, entry);
  const shouldCollapse = complete && state.settings.autoCollapse && !entry.manuallyExpanded;
  // Marker used by the FLIP reshuffle animation (see animateReflow)
  const flipAttr = { "data-ex-id": exDef.id };

  if (shouldCollapse) {
    const card = el("div", { class: "exercise-card done collapsed", ...flipAttr });
    card.appendChild(el("div", { class: "collapsed-body" },
      el("div", {},
        el("button", { class: "ex-name-btn", onclick: () => openExerciseModal(exDef.id) },
          ex.name,
          el("span", { class: "info-icon" }, "i")
        ),
        el("div", { class: "collapsed-summary" },
          el("span", { class: "ex-check" }, "✓"),
          el("span", {}, `${entry.actualWeight} lb · ${entry.sets.length} sets · ${entry.sets.reduce((a,s)=>a+s.reps,0)} reps`)
        )
      ),
      el("button", { class: "collapsed-expand", onclick: () => { haptic(6); entry.manuallyExpanded = true; saveState(true); render(); } }, "Edit")
    ));
    return card;
  }

  const card = el("div", { class: "exercise-card" + (complete ? " done" : ""), ...flipAttr });

  const head = el("div", { class: "ex-head" },
    el("div", {},
      el("button", { class: "ex-name-btn", onclick: () => openExerciseModal(exDef.id) },
        ex.name,
        el("span", { class: "info-icon" }, "i")
      ),
      el("div", { class: "ex-target" }, `${exDef.sets} sets × ${exDef.reps} reps`)
    ),
    complete ? el("span", { class: "ex-check" }, "✓") : null
  );
  card.appendChild(head);

  // Previous session note, if any
  const prev = lastSessionEntryForExercise(exDef.id, draft.date);
  if (prev && prev.entry.note) {
    card.appendChild(el("div", { class: "note-prev" }, `Last time: "${prev.entry.note}"`));
  }

  // Weight control
  const wIdx = DUMBBELLS.indexOf(entry.actualWeight);
  const wc = el("div", { class: "weight-control" },
    el("div", { style: { display: "flex", flexDirection: "column" } },
      el("span", { class: "label" }, "Weight"),
      entry.actualWeight !== entry.suggestedWeight
        ? el("span", { style: { fontSize: "11px", color: "var(--text-faint)", marginTop: "2px" } }, `suggested ${entry.suggestedWeight}`)
        : null
    ),
    el("button", { class: "wbtn", disabled: wIdx <= 0, onclick: () => adjustWeight(exDef.id, -1) }, "−"),
    el("div", { class: "value" }, entry.actualWeight, el("span", { class: "unit" }, " lb")),
    el("button", { class: "wbtn", disabled: wIdx >= DUMBBELLS.length - 1, onclick: () => adjustWeight(exDef.id, +1) }, "+")
  );
  card.appendChild(wc);

  // Column labels
  card.appendChild(
    el("div", { class: "set-col-label-row" },
      el("div", {}),
      el("div", { class: "set-col-label" }, "Reps"),
      el("div", { class: "set-col-label" }, "RPE")
    )
  );

  for (let i = 0; i < exDef.sets; i++) {
    const setData = entry.sets[i] || {};
    const prevSetData = i > 0 ? entry.sets[i-1] : null;
    const prevSetComplete = prevSetData && typeof prevSetData.reps === "number" && typeof prevSetData.rpe === "number";
    const thisSetBlank = !setData || (typeof setData.reps !== "number" && typeof setData.rpe !== "number");
    card.appendChild(renderSetRow(exDef, i, setData, prevSetComplete && thisSetBlank ? prevSetData : null));
  }

  // Note toggle/field
  card.appendChild(renderNoteArea(exDef, entry));

  return card;
}

function renderNoteArea(exDef, entry) {
  const wrap = el("div", { class: "note-bar" });
  if (entry.noteOpen) {
    const ta = el("textarea", {
      placeholder: "Quick note for next time (form feel, grip, etc.)",
      value: entry.note || "",
      oninput: (e) => { entry.note = e.target.value; },
      onblur: () => { saveState(); }
    });
    const row = el("div", { style: { display: "flex", gap: "6px", marginTop: "6px", justifyContent: "space-between" } },
      el("button", { class: "btn btn-sm btn-ghost", onclick: () => { haptic(6); entry.noteOpen = false; saveState(); render(); } }, "Done"),
      entry.note ? el("button", { class: "btn btn-sm btn-danger", onclick: () => { haptic(8); entry.note = ""; entry.noteOpen = false; saveState(); render(); } }, "Clear") : null
    );
    wrap.appendChild(ta);
    wrap.appendChild(row);
  } else {
    wrap.appendChild(
      el("button", { class: "note-toggle", onclick: () => { haptic(6); entry.noteOpen = true; saveState(true); render(); } },
        el("span", {}, entry.note ? "📝 " : "＋ "),
        el("span", {}, entry.note ? `"${entry.note.length > 40 ? entry.note.slice(0,40)+"…" : entry.note}"` : "Add note")
      )
    );
  }
  return wrap;
}

function renderSetRow(exDef, setIdx, setData, copyFromPrev) {
  const targetReps = exDef.reps;
  const repOptions = [];
  for (let r = Math.max(0, targetReps - 2); r <= targetReps + 2; r++) repOptions.push(r);
  const rpeOptions = [6, 7, 8, 9, 10];

  const leftCol = el("div", { class: "set-label" },
    `Set ${setIdx + 1}`,
    copyFromPrev ? el("button", {
      class: "copy-btn",
      onclick: () => copyPreviousSet(exDef.id, setIdx),
      title: `Copy: ${copyFromPrev.reps} reps @ RPE ${copyFromPrev.rpe}`
    }, "↻ Same") : null
  );

  const row = el("div", { class: "set-row" },
    leftCol,
    el("div", { class: "pill-group" },
      ...repOptions.map(r => el("button", {
        class: "pill" + (setData.reps === r ? " on" : ""),
        onclick: () => setRep(exDef.id, setIdx, r)
      }, r))
    ),
    el("div", { class: "pill-group" },
      ...rpeOptions.map(r => {
        let extra = "";
        if (setData.rpe === r) {
          if (r <= 7) extra = " easy";
          else if (r === 8) extra = " mod";
          else extra = " hard";
        }
        return el("button", {
          class: "pill" + (setData.rpe === r ? " on" + extra : ""),
          onclick: () => setRpe(exDef.id, setIdx, r)
        }, r);
      })
    )
  );
  return row;
}

function setRep(exId, setIdx, reps) {
  const entry = state.draft.entries[exId];
  const prev = { ...entry.sets[setIdx] };
  entry.sets[setIdx] = { ...entry.sets[setIdx], reps };
  haptic(8);
  saveState();
  const wasComplete = typeof prev.reps === "number" && typeof prev.rpe === "number";
  const nowComplete = typeof entry.sets[setIdx].reps === "number" && typeof entry.sets[setIdx].rpe === "number";
  if (nowComplete && !wasComplete) onSetCompleted(exId, setIdx);
  captureUndo(`Set ${setIdx+1} reps = ${reps}`, () => {
    if (Object.keys(prev).length === 0) entry.sets[setIdx] = {};
    else entry.sets[setIdx] = prev;
    saveState();
    render();
  });
  render();
}

function setRpe(exId, setIdx, rpe) {
  const entry = state.draft.entries[exId];
  const prev = { ...entry.sets[setIdx] };
  entry.sets[setIdx] = { ...entry.sets[setIdx], rpe };
  haptic(8);
  saveState();
  const wasComplete = typeof prev.reps === "number" && typeof prev.rpe === "number";
  const nowComplete = typeof entry.sets[setIdx].reps === "number" && typeof entry.sets[setIdx].rpe === "number";
  if (nowComplete && !wasComplete) onSetCompleted(exId, setIdx);
  captureUndo(`Set ${setIdx+1} RPE = ${rpe}`, () => {
    if (Object.keys(prev).length === 0) entry.sets[setIdx] = {};
    else entry.sets[setIdx] = prev;
    saveState();
    render();
  });
  render();
}

function copyPreviousSet(exId, setIdx) {
  const entry = state.draft.entries[exId];
  const prevSet = entry.sets[setIdx - 1];
  if (!prevSet || typeof prevSet.reps !== "number" || typeof prevSet.rpe !== "number") return;
  const prev = { ...entry.sets[setIdx] };
  entry.sets[setIdx] = { reps: prevSet.reps, rpe: prevSet.rpe };
  haptic(12);
  saveState();
  const wasComplete = typeof prev.reps === "number" && typeof prev.rpe === "number";
  if (!wasComplete) onSetCompleted(exId, setIdx);
  captureUndo(`Copied set ${setIdx} → ${setIdx+1}`, () => {
    if (Object.keys(prev).length === 0) entry.sets[setIdx] = {};
    else entry.sets[setIdx] = prev;
    saveState();
    render();
  });
  render();
}

function onSetCompleted(exId, setIdx) {
  // Start rest timer if not the last set of last exercise
  const draft = state.draft;
  const day = PROGRAM.days[draft.dayIndex];
  const exDef = day.exercises.find(e => e.id === exId);
  if (!exDef) return;
  const isLastSetOfExercise = setIdx >= exDef.sets - 1;
  // Check if this was the last exercise's last set
  const allOtherComplete = day.exercises.every(e => {
    if (e.id === exId) return setIdx >= exDef.sets - 1; // we're completing this one
    return isExerciseComplete(e, draft.entries[e.id]);
  });
  if (isLastSetOfExercise && allOtherComplete) {
    // Don't start a timer — session is done
    return;
  }
  const secs = isCompound(exDef) ? state.settings.restCompoundSec : state.settings.restIsolationSec;
  const label = isLastSetOfExercise ? "Rest before next exercise" : "Rest between sets";
  startRest(secs, label);
}

function adjustWeight(exId, delta) {
  const entry = state.draft.entries[exId];
  const idx = DUMBBELLS.indexOf(entry.actualWeight);
  const next = DUMBBELLS[Math.max(0, Math.min(DUMBBELLS.length - 1, idx + delta))];
  if (next === entry.actualWeight) return;
  const prev = entry.actualWeight;
  entry.actualWeight = next;
  haptic(6);
  saveState();
  captureUndo(`Weight ${prev} → ${next} lb`, () => { entry.actualWeight = prev; pendingBumpExId = exId; saveState(); render(); });
  pendingBumpExId = exId;
  render();
}

function toggleOrderMode() {
  haptic(8);
  state.settings.orderMode = state.settings.orderMode === "weight" ? "program" : "weight";
  saveState(true);
  render();
}

function confirmLeaveSession() {
  const hasData = Object.values(state.draft.entries).some(e => e.sets.some(s => typeof s.reps === "number" || typeof s.rpe === "number"));
  if (!hasData || confirm("Leave session? Your progress is saved — you can resume from the home screen.")) {
    haptic(8);
    dismissRest();
    view = { name: "home" };
    render();
  }
}

function finishSession() {
  const draft = state.draft;
  const day = PROGRAM.days[draft.dayIndex];
  const anyLogged = day.exercises.some(ex => {
    const e = draft.entries[ex.id];
    return e.sets.some(s => typeof s.reps === "number" && typeof s.rpe === "number");
  });
  if (!anyLogged) {
    if (!confirm("No sets have been logged. Finish anyway (no progression will be calculated)?")) return;
  }
  haptic(20);
  dismissRest();
  const cleanedEntries = {};
  for (const ex of day.exercises) {
    const e = draft.entries[ex.id];
    const validSets = e.sets.filter(s => typeof s.reps === "number" && typeof s.rpe === "number");
    cleanedEntries[ex.id] = {
      suggestedWeight: e.suggestedWeight,
      actualWeight: e.actualWeight,
      sets: validSets,
      note: (e.note || "").trim(),
    };
  }
  const endedAt = new Date().toISOString();
  const durationSec = Math.floor((new Date(endedAt) - new Date(draft.startedAt || draft.date)) / 1000);
  const session = {
    id: draft.id,
    dayIndex: draft.dayIndex,
    date: endedAt,
    startedAt: draft.startedAt || draft.date,
    durationSec,
    entries: cleanedEntries
  };
  const updates = applyProgression(session);
  state.sessions.push(session);
  state.draft = null;
  saveState();
  view = { name: "preview", session, updates };
  render();
}

function renderPreview(root) {
  const { session, updates } = view;
  const day = PROGRAM.days[session.dayIndex];

  root.appendChild(el("div", { class: "topbar" },
    el("div", {},
      el("h1", {}, "Next " + day.name),
      el("div", { class: "sub" }, "Suggested weights for your next session")
    )
  ));

  const totalSetsLogged = Object.values(session.entries).reduce((a, e) => a + e.sets.length, 0);
  const avgRpe = (() => {
    const rpes = [].concat(...Object.values(session.entries).map(e => e.sets.map(s => s.rpe)));
    if (rpes.length === 0) return null;
    return (rpes.reduce((a,b)=>a+b,0) / rpes.length).toFixed(1);
  })();
  const mins = Math.floor(session.durationSec / 60);
  root.appendChild(
    el("div", { class: "preview-card" },
      el("div", { class: "preview-name" }, "Session summary"),
      el("div", { class: "preview-reason" },
        `${totalSetsLogged} sets · ${mins} min` + (avgRpe ? ` · avg RPE ${avgRpe}` : "")
      )
    )
  );

  const prCount = updates.filter(u => u.isPR).length;
  if (prCount > 0) {
    root.appendChild(el("div", { class: "hint", style: { color: "var(--pr)", marginTop: "-2px" } },
      `🎯 ${prCount} new personal record${prCount>1?"s":""} — the increase${prCount>1?"s":""} below take${prCount>1?"":"s"} you past your previous max.`
    ));
  }

  for (const u of updates) {
    const change = u.after - u.before;
    const changeClass = change > 0 ? "change-up" : change < 0 ? "change-down" : "change-same";
    const arrow = change > 0 ? "↑" : change < 0 ? "↓" : "→";
    root.appendChild(
      el("div", { class: "preview-card" + (u.isPR ? " pr" : "") },
        el("div", { class: "preview-name" },
          u.name,
          u.isPR ? el("span", { class: "pr-badge" }, "🎯 NEW PR") : null
        ),
        el("div", { class: "preview-change" },

          el("span", { class: changeClass }, `${u.after} lb ${arrow}`)
        ),
        el("div", { class: "preview-reason" }, u.reason)
      )
    );
  }

  root.appendChild(
    el("div", { class: "action-bar" },
      el("div", { class: "inner" },
        el("button", { class: "btn btn-primary btn-lg btn-block", onclick: () => { haptic(10); view = { name: "home" }; render(); } }, "Done")
      )
    )
  );
}

function numberField(key, min, max, step) {

    onchange: (e) => {
      let v = Number(e.target.value);
      if (!isFinite(v)) v = state.settings[key];
      v = Math.max(min, Math.min(max, v));
      state.settings[key] = v;
      saveState();
    }
  });
}

function closeModal() {

function buildSparklineCard(series, currentWeight) {
  const wrap = el("div", { class: "spark-wrap" });
  wrap.appendChild(el("div", { class: "spark-head" },
    el("strong", {}, "Progress"),
    el("span", {}, series.length > 0 ? `${series.length} session${series.length>1?"s":""} · now ${currentWeight} lb` : `Starting ${currentWeight} lb`)
  ));
  if (series.length === 0) {
    wrap.appendChild(el("div", { class: "spark-empty" }, "Log a session to start tracking."));
  } else if (series.length === 1) {
    wrap.appendChild(el("div", { class: "spark-empty" }, `Single session at ${series[0].value} lb — one more to see the trend.`));
  } else {
    wrap.appendChild(sparklineSVG(series));
  }
  return wrap;
}

function sparklineSVG(series) {
  const width = 320;
  const height = 80;
  const pad = 8;
  const values = series.map(s => s.value);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const n = series.length;
  const step = (width - 2*pad) / (n - 1);
  const points = series.map((d, i) => {
    const x = pad + i * step;
    const y = height - pad - ((d.value - min) / range) * (height - 2*pad);
    return { x, y, value: d.value };
  });
  const pathD = "M " + points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" L ");
  const areaD = pathD + ` L ${points[points.length-1].x.toFixed(1)},${height-pad} L ${pad},${height-pad} Z`;
  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
  svg.setAttribute("preserveAspectRatio", "none");
  svg.style.width = "100%";
  svg.style.height = height + "px";
  svg.style.display = "block";
  // Area fill
  const area = document.createElementNS(svgNS, "path");
  area.setAttribute("d", areaD);
  area.setAttribute("fill", "rgba(90, 155, 255, 0.15)");
  svg.appendChild(area);
  // Line
  const line = document.createElementNS(svgNS, "path");
  line.setAttribute("d", pathD);
  line.setAttribute("fill", "none");
  line.setAttribute("stroke", "var(--accent)");
  line.setAttribute("stroke-width", "2");
  line.setAttribute("stroke-linecap", "round");
  line.setAttribute("stroke-linejoin", "round");
  svg.appendChild(line);
  // Points
  for (const p of points) {
    const c = document.createElementNS(svgNS, "circle");
    c.setAttribute("cx", p.x);
    c.setAttribute("cy", p.y);
    c.setAttribute("r", "2.5");
    c.setAttribute("fill", "var(--accent)");
    svg.appendChild(c);
  }
  // Last point highlight
  const last = points[points.length-1];
  const lastC = document.createElementNS(svgNS, "circle");
  lastC.setAttribute("cx", last.x);
  lastC.setAttribute("cy", last.y);
  lastC.setAttribute("r", "4");
  lastC.setAttribute("fill", "var(--accent)");
  lastC.setAttribute("stroke", "var(--bg-raised)");
  lastC.setAttribute("stroke-width", "2");
  svg.appendChild(lastC);
  return svg;
}

//============================================================
// Import / export
//============================================================

function exportData() {
  haptic(8);
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `liftlog-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function triggerImport() {
  haptic(8);
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json,.json";
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        if (!imported || typeof imported !== "object" || !imported.weights) throw new Error("Invalid file");
        if (!confirm("Replace current data with imported data?")) return;
        state = { ...defaultState(), ...imported };
        saveState();
        setTimeout(() => { view = { name: "home" }; render(); }, 200);
      } catch (e) {
        alert("Failed to import: " + e.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
function resetAll() {
  if (!confirm("Erase ALL local data? This can't be undone (unless you also push to Pantry).")) return;
  if (!confirm("Really erase everything?")) return;
  haptic(30);
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
  saveState();
  view = { name: "home" };
  render();
}

//============================================================
// Boot
//============================================================

// Update the session elapsed counter every minute when in session
let sessionTickInterval = null;
function startSessionTicker() {
  stopSessionTicker();
  sessionTickInterval = setInterval(() => {
    if (view.name === "session" && state.draft) {
      // Only rerender the topbar subtitle — cheap path: just rerender all
      // We avoid full render cost by only rerendering every 60s
      render();
    }
  }, 60000);
}
function stopSessionTicker() {
  if (sessionTickInterval) clearInterval(sessionTickInterval);
  sessionTickInterval = null;
}

window.addEventListener("DOMContentLoaded", () => {
  const isFirstLaunch = state.sessions.length === 0 && !state.settings.pantryId && !localStorage.getItem(STORAGE_KEY + ".welcomed");
  if (isFirstLaunch) {
    localStorage.setItem(STORAGE_KEY + ".welcomed", "1");
    view = { name: "onboarding" };
  }
  render();
  startSessionTicker();
  if (state.settings.pantryId) pullFromPantry({ rerender: true });
});

window.addEventListener("beforeunload", () => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
});
</script>
